<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title><!-- 项目标题 --></title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg-primary: #0f0f1a;
    --bg-secondary: #1a1a2e;
    --bg-card: #16213e;
    --bg-hover: #1e2d4a;
    --text-primary: #e0e6f0;
    --text-secondary: #8899b0;
    --text-muted: #5a6a80;
    --accent: #4fc3f7;
    --accent-dim: #0288d1;
    --border: #2a2a4a;
    --sidebar-width: 280px;
    --header-height: 56px;
    --code-bg: #1a1a2e;
    --code-border: #2a2a4a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.8;
  }
  .header {
    position: fixed; top: 0; left: 0; right: 0; height: var(--header-height);
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 16px; z-index: 100;
    backdrop-filter: blur(12px);
  }
  .header .menu-btn {
    background: none; border: none; color: var(--text-primary);
    font-size: 24px; cursor: pointer; padding: 8px; margin-right: 12px;
    width: 40px; height: 40px; border-radius: 8px;
  }
  .header h1 {
    font-size: 18px; font-weight: 600;
    background: linear-gradient(135deg, var(--accent), #7c4dff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .sidebar-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 98;
  }
  .sidebar-overlay.active { display: block; }
  .sidebar {
    position: fixed; top: var(--header-height); left: 0; bottom: 0;
    width: var(--sidebar-width); background: var(--bg-secondary);
    border-right: 1px solid var(--border); z-index: 99;
    overflow-y: auto; transition: transform 0.3s ease;
  }
  .sidebar-section-title {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 16px; font-size: 13px; font-weight: 600;
    color: var(--accent); cursor: pointer;
  }
  .sidebar-item {
    display: block; padding: 8px 16px 8px 28px; font-size: 13px;
    color: var(--text-secondary); cursor: pointer; text-decoration: none;
    border-left: 3px solid transparent;
  }
  .sidebar-item:hover { background: var(--bg-hover); color: var(--text-primary); }
  .sidebar-item.active { color: var(--accent); background: rgba(79,195,247,0.12); border-left-color: var(--accent); }
  .main {
    margin-left: var(--sidebar-width); margin-top: var(--header-height);
    padding: 24px 32px; max-width: 900px;
  }
  .markdown-body h1 { font-size: 28px; font-weight: 700; margin: 32px 0 20px; border-bottom: 2px solid var(--border); }
  .markdown-body h2 { font-size: 22px; font-weight: 600; margin: 28px 0 16px; color: var(--accent); }
  .markdown-body h3 { font-size: 18px; font-weight: 600; margin: 24px 0 12px; }
  .markdown-body p { margin: 12px 0; }
  .markdown-body code { font-family: monospace; font-size: 13px; background: var(--code-bg); padding: 2px 6px; border-radius: 4px; color: #f8c555; border: 1px solid var(--code-border); }
  .markdown-body pre { background: var(--code-bg); border: 1px solid var(--code-border); border-radius: 10px; padding: 16px 20px; overflow-x: auto; margin: 16px 0; position: relative; }
  .markdown-body pre code { font-size: 14px; line-height: 1.7; color: #e6db74; background: none; padding: 0; border: none; }
  .markdown-body table { width: 100%; border-collapse: collapse; margin: 16px 0; border-radius: 10px; overflow: hidden; }
  .markdown-body th { background: var(--bg-hover); color: var(--accent); padding: 12px 14px; border: 1px solid var(--border); }
  .markdown-body td { padding: 10px 14px; border: 1px solid var(--border); background: var(--bg-card); }
  .markdown-body blockquote { border-left: 4px solid var(--accent-dim); padding: 12px 20px; margin: 16px 0; background: var(--bg-card); border-radius: 0 8px 8px 0; }
  .copy-btn {
    position: absolute; top: 8px; right: 8px;
    background: var(--bg-hover); border: 1px solid var(--border);
    color: var(--text-muted); padding: 4px 10px; border-radius: 6px;
    font-size: 11px; cursor: pointer; opacity: 0; transition: opacity 0.2s;
  }
  pre:hover .copy-btn { opacity: 1; }
  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); width: 85vw; max-width: 320px; }
    .sidebar.open { transform: translateX(0); }
    .header .menu-btn { display: flex; }
    .main { margin-left: 0; padding: 20px 16px; }
    .markdown-body h1 { font-size: 22px; }
    .markdown-body pre { padding: 12px 14px; }
    .markdown-body pre code { font-size: 12px; }
  }
  @media (min-width: 769px) { .header .menu-btn { display: none; } }
</style>
</head>
<body>
<header class="header">
  <button class="menu-btn" onclick="toggleSidebar()">☰</button>
  <h1><!-- 项目标题 --></h1>
</header>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<nav class="sidebar" id="sidebar">
  <div class="sidebar-section">
    <a class="sidebar-item" onclick="loadDoc('README.md'); toggleSidebar();">🏠 首页</a>
  </div>
  <!-- 按周/目录分组填充 -->
</nav>
<main class="main" id="mainContent">
  <div class="loading"><div class="spinner"></div><p>加载中...</p></div>
</main>
<script>
/* === 配置 === */
const GIT_RAW = 'https://gitee.com/{user}/{repo}/raw/{branch}';
/* === Markdown渲染 === */
marked.setOptions({ breaks: true, gfm: true, headerIds: true });
/* === 侧栏切换 === */
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('active');
}
/* === 加载文档 === */
async function loadDoc(path) {
  document.getElementById('mainContent').innerHTML = '<div class="loading"><div class="spinner"></div><p>加载中...</p></div>';
  try {
    const resp = await fetch(`${GIT_RAW}/${path}`);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const md = await resp.text();
    document.getElementById('mainContent').innerHTML = `<div class="markdown-body">${marked.parse(md)}</div>`;
    document.querySelectorAll('.markdown-body pre').forEach(pre => {
      const btn = document.createElement('button');
      btn.className = 'copy-btn'; btn.textContent = '📋 复制';
      btn.onclick = () => {
        const code = pre.querySelector('code');
        navigator.clipboard.writeText(code.textContent).then(() => {
          btn.textContent = '✅ 已复制';
          setTimeout(() => { btn.textContent = '📋 复制'; }, 2000);
        });
      };
      pre.appendChild(btn);
    });
  } catch(e) {
    document.getElementById('mainContent').innerHTML = `<div class="error"><h2>加载失败</h2><p>${e.message}</p></div>`;
  }
}
loadDoc('README.md');
</script>
</body>
</html>
